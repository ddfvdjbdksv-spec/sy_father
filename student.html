<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>صفحة متابعة الطالب</title>
    <link rel="icon" href="app-icon-192.png" type="image/png">
    <link rel="stylesheet" href="vendor/fontawesome.min.css" onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css';">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root { --primary:#2563eb; --primary-dark:#1d4ed8; --bg:#f1f5f9; --card:#fff; --border:#e5e7eb; --muted:#64748b; --text:#1f2937; --ok:#16a34a; --bad:#dc2626; --warn:#d97706; }
        body { font-family:'Segoe UI', Tahoma, Arial, sans-serif; background:var(--bg); min-height:100vh; padding:1rem; margin:0; color:var(--text); }
        .wrap { max-width:860px; margin:0 auto; }
        .hero { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; border-radius:16px; padding:1.3rem; box-shadow:0 16px 40px rgba(37,99,235,.22); margin-bottom:1rem; display:flex; gap:1rem; align-items:center; }
        .avatar { width:82px; height:82px; border-radius:14px; background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; overflow:hidden; flex:0 0 auto; border:1px solid rgba(255,255,255,.35); }
        .avatar img { width:100%; height:100%; object-fit:cover; display:block; }
        .avatar i { font-size:2.1rem; opacity:.9; }
        .hero h1 { margin:.1rem 0 .35rem; font-size:1.55rem; line-height:1.35; }
        .hero .sub { opacity:.92; font-weight:600; line-height:1.7; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:12px; box-shadow:0 1px 8px rgba(15,23,42,.06); padding:1rem; margin-bottom:1rem; }
        .card h2 { margin:0 0 .85rem; color:var(--primary); font-size:1rem; display:flex; gap:.45rem; align-items:center; }
        .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.65rem; }
        .stat { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:.8rem; text-align:center; }
        .stat .num { font-size:1.35rem; font-weight:800; color:var(--primary); }
        .stat .lbl { color:var(--muted); font-size:.75rem; margin-top:.2rem; }
        .rows { display:grid; grid-template-columns:repeat(2,1fr); gap:.35rem .9rem; }
        .row { display:flex; justify-content:space-between; gap:.75rem; padding:.55rem 0; border-bottom:1px dashed var(--border); }
        .row .k { color:var(--muted); }
        .row .v { font-weight:700; text-align:left; direction:rtl; }
        .badge { display:inline-flex; align-items:center; gap:.35rem; border-radius:999px; padding:.2rem .7rem; font-size:.82rem; font-weight:800; }
        .badge.ok { background:#dcfce7; color:#166534; } .badge.bad { background:#fee2e2; color:#991b1b; } .badge.warn { background:#fff7ed; color:#9a3412; } .badge.muted { background:#f1f5f9; color:#64748b; }
        .period-bar { display:flex; gap:.55rem; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:1rem; }
        .period-bar button, .period-bar select { height:40px; border-radius:9px; border:1px solid var(--border); background:#fff; font-family:inherit; font-weight:800; color:var(--text); padding:0 .8rem; }
        .period-bar button { cursor:pointer; color:var(--primary); min-width:44px; }
        .table-wrap { overflow:auto; border:1px solid var(--border); border-radius:10px; }
        table { width:100%; border-collapse:collapse; min-width:620px; background:#fff; }
        th, td { padding:.7rem; border-bottom:1px solid var(--border); text-align:right; vertical-align:top; font-size:.9rem; }
        th { background:#f8fafc; color:#475569; font-size:.82rem; }
        .section-row td { background:#eff6ff; color:#1d4ed8; font-weight:900; }
        .note { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:.85rem; line-height:1.8; color:#334155; }
        .state { text-align:center; padding:3rem 1rem; color:var(--muted); }
        .state i { display:block; font-size:2.5rem; color:#93c5fd; margin-bottom:1rem; }
        .footer { text-align:center; color:var(--muted); font-size:.78rem; padding:1rem 0; }
        @media (max-width:720px) { body{padding:.65rem}.hero{align-items:flex-start}.grid{grid-template-columns:repeat(2,1fr)}.rows{grid-template-columns:1fr}.hero h1{font-size:1.25rem}.avatar{width:68px;height:68px} }
    </style>
</head>
<body>
<div class="wrap" id="app-root"><div class="state"><i class="fas fa-circle-notch fa-spin"></i>جاري تحميل بيانات الطالب...</div></div>

<script>
// ✅ إصلاح: نظام احتياطي يحمّل Firebase من CDN لو نسخة vendor المحلية فشلت
// (يحدث لو ملفات vendor مش مرفوعة صح على الاستضافة — مثل GitHub Pages)
window._fbLoadFailed = false;
window._fbFallbackPromise = null;
function _fbCdnFallback(){
    if (window._fbFallbackPromise) return window._fbFallbackPromise;
    const FB_VER = '10.13.2';
    function loadScript(src){
        return new Promise((resolve) => {
            const s = document.createElement('script');
            s.src = src;
            s.onload = () => resolve(true);
            s.onerror = () => resolve(false);
            document.head.appendChild(s);
        });
    }
    window._fbFallbackPromise = (async () => {
        console.warn('[Firebase] ⚠️ ملفات vendor المحلية غير متاحة — جارٍ التحميل من CDN احتياطياً...');
        const ok1 = await loadScript(`https://www.gstatic.com/firebasejs/${FB_VER}/firebase-app-compat.js`);
        const ok2 = ok1 && await loadScript(`https://www.gstatic.com/firebasejs/${FB_VER}/firebase-firestore-compat.js`);
        if (ok1 && ok2) console.log('[Firebase] ✅ تم التحميل بنجاح من CDN الاحتياطي');
        else console.error('[Firebase] ❌ فشل التحميل من CDN الاحتياطي أيضاً — تحقق من الاتصال بالإنترنت');
        return ok1 && ok2;
    })();
    return window._fbFallbackPromise;
}
</script>
<script src="vendor/firebase-app-compat.js" onerror="window._fbLoadFailed=true; _fbCdnFallback();"></script>
<script src="vendor/firebase-firestore-compat.js" onerror="window._fbLoadFailed=true; _fbCdnFallback();"></script>
<script>
const firebaseConfig = { apiKey:'AIzaSyBpEyl2yKbUPf8NQpsGLVISNzno1qJAedI', authDomain:'syfather.firebaseapp.com', projectId:'syfather', storageBucket:'syfather.firebasestorage.app', messagingSenderId:'929000000845', appId:'1:929000000845:web:78407e4aafc771b7cafb04' };
let DB = null;
let unsubscribeStudent = null;
const TABLES = ['attendance','payments','scores','exams','cycles','absenceSessions','studentHandouts','handouts'];
const GRADE_LABELS = { prim1:'أولى ابتدائي', prim2:'ثانية ابتدائي', prim3:'ثالثة ابتدائي', prim4:'رابعة ابتدائي', prim5:'خامسة ابتدائي', prim6:'سادسة ابتدائي', prep1:'أولى إعدادي', prep2:'ثانية إعدادي', prep3:'ثالثة إعدادي', '1':'أولى ثانوي', '2':'ثانية ثانوي', '3':'ثالثة ثانوي' };
const ARABIC_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
let pageData = null;
let currentPeriodKey = '';

function esc(v){ return String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
async function initFB(){ try { if (window._fbLoadFailed || typeof firebase === 'undefined') { const recovered = await _fbCdnFallback(); if (!recovered || typeof firebase === 'undefined') throw new Error('Firebase files are not loaded (local vendor + CDN fallback both failed)'); } const app = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(firebaseConfig); DB = app.firestore(); return true; } catch(e){ console.error(e); return false; } }
function rootState(icon, msg, small=''){ document.getElementById('app-root').innerHTML = `<div class="state"><i class="fas ${icon}"></i>${msg}${small ? `<br><small>${small}</small>` : ''}</div>`; }
async function getAll(col){ const snap = await DB.collection(col).get(); return snap.docs.map(d => ({ id: d.data().id ?? d.id, ...d.data() })); }
async function queryBoth(col, field, value){ const vals = [String(value)]; const num = Number(value); if (value !== '' && value !== null && value !== undefined && Number.isFinite(num)) vals.push(num); const out=[]; for (const v of vals) { try { const snap = await DB.collection(col).where(field,'==',v).get(); snap.docs.forEach(d => { const row={ id:d.data().id ?? d.id, ...d.data() }; if (!out.some(x => String(x.id) === String(row.id))) out.push(row); }); } catch(e){ console.warn('query failed', col, field, v, e); } } return out; }
async function findStudent(code){ let arr = await queryBoth('students','qrCode',code); if (!arr.length) { try { const doc = await DB.collection('students').doc(String(code)).get(); if (doc.exists) arr=[{ id:doc.data().id ?? doc.id, ...doc.data() }]; } catch(e){} } return arr[0] || null; }
async function loadData(code){ const s = await findStudent(code); if (!s) return null; const [groupDoc, attendance, payments, scores, exams, cycles, absenceSessions, studentHandouts, handouts] = await Promise.all([ s.groupId ? DB.collection('groups').doc(String(s.groupId)).get().catch(()=>null) : null, queryBoth('attendance','studentId',s.id), queryBoth('payments','studentId',s.id), queryBoth('scores','studentId',s.id), getAll('exams'), getAll('cycles'), getAll('absenceSessions'), queryBoth('studentHandouts','studentId',s.id), getAll('handouts') ]); const group = groupDoc && groupDoc.exists ? groupDoc.data() : null; return { s, group, attendance, payments, scores, exams, cycles, absenceSessions, studentHandouts, handouts }; }
function dateOf(v){ const d = new Date(v); return isNaN(d) ? null : d; }
function periodKey(y,m){ return `${y}-${String(m+1).padStart(2,'0')}`; }
function monthBounds(y,m){ return { start:new Date(y,m,1), end:new Date(y,m+1,1) }; }
function buildPeriods(d){ const {s, attendance, payments, exams, cycles} = d; const periods=[]; const matchingCycles = cycles.filter(c => (!c.groupId || String(c.groupId)===String(s.groupId)) && (!c.grade || String(c.grade)===String(s.grade))).map(c => { const start=dateOf(c.startDate || c.date || c.id); const end=dateOf(c.endDate || c.date); if (!start) return null; return { key:`cycle-${c.id}`, label:c.title || c.name || `${ARABIC_MONTHS[start.getMonth()]} ${start.getFullYear()}`, start, end:(end && end>start)?end:new Date(start.getTime()+86400000), year:start.getFullYear(), month:start.getMonth() }; }).filter(Boolean); periods.push(...matchingCycles); const addMonth = (date) => { if (!date) return; const k=`month-${periodKey(date.getFullYear(),date.getMonth())}`; if (!periods.some(p=>p.key===k)) { const b=monthBounds(date.getFullYear(),date.getMonth()); periods.push({ key:k, label:`${ARABIC_MONTHS[date.getMonth()]} ${date.getFullYear()}`, ...b, year:date.getFullYear(), month:date.getMonth() }); } }; attendance.forEach(a => addMonth(dateOf(a.date))); payments.forEach(p => addMonth(p.year && p.month ? new Date(p.year, p.month-1, 1) : dateOf(p.date))); exams.filter(e => String(e.grade)===String(s.grade) && (!e.groupId || String(e.groupId)===String(s.groupId))).forEach(e => addMonth(dateOf(e.date || Number(e.id)))); addMonth(new Date()); return periods.sort((a,b)=>b.start-a.start); }
function inPeriod(date, p){ const d=dateOf(date); return d && d>=p.start && d<p.end; }
function moneyBadge(p){ if (!p) return '<span class="badge bad">غير مدفوع</span>'; if (p.isExemption) return '<span class="badge ok">معفى</span>'; return `<span class="badge ok">مدفوع ${esc(p.amount || 0)} ج.م</span>`; }
function scoreBadge(mark,max){ if (mark === -1) return '<span class="badge bad">غائب</span>'; if (mark === null || mark === undefined) return '<span class="badge muted">لم ترصد</span>'; const pct = Math.round((Number(mark)/(Number(max)||100))*100); const cls = pct >= 75 ? 'ok' : pct >= 50 ? 'warn' : 'bad'; return `<span class="badge ${cls}">${esc(mark)} من ${esc(max || '?')} (${pct}%)</span>`; }
function switchPeriod(key){ currentPeriodKey = key; render(pageData); }
window.switchPeriod = switchPeriod;
function renderReport(d, p){ const {s, attendance, payments, scores, exams, absenceSessions, studentHandouts, handouts} = d; const periodAtts = attendance.filter(a => inPeriod(a.date,p)); const sessionIds = new Set(periodAtts.filter(a=>a.sessionId).map(a=>String(a.sessionId))); const extraPresent = absenceSessions.filter(sess => inPeriod(sess.date,p) && (!sess.grade || String(sess.grade)===String(s.grade)) && (!sess.groupId || String(sess.groupId)===String(s.groupId)) && !sessionIds.has(String(sess.id)) && Array.isArray(sess.presentIds) && sess.presentIds.map(String).includes(String(s.id))); const extraAbsent = absenceSessions.filter(sess => inPeriod(sess.date,p) && (!sess.grade || String(sess.grade)===String(s.grade)) && (!sess.groupId || String(sess.groupId)===String(s.groupId)) && !sessionIds.has(String(sess.id)) && Array.isArray(sess.absentIds) && sess.absentIds.map(String).includes(String(s.id))); const present = [...periodAtts.filter(a=>a.status==='present'), ...extraPresent.map(x=>({date:x.date,_name:x.name}))]; const absent = [...periodAtts.filter(a=>a.status==='absent'), ...extraAbsent.map(x=>({date:x.date,_name:x.name}))]; const periodExams = exams.filter(e => String(e.grade)===String(s.grade) && (!e.groupId || String(e.groupId)===String(s.groupId)) && inPeriod(e.date || Number(e.id),p)).sort((a,b)=>Number(a.id)-Number(b.id)); const periodPayments = payments.filter(x => x.category === 'اشتراك شهري' ? ((x.year && x.month) ? Number(x.year)===p.year && Number(x.month)===p.month+1 : inPeriod(x.date,p)) : inPeriod(x.date,p)); const sub = periodPayments.find(x => x.category === 'اشتراك شهري') || null; const handoutRows = studentHandouts.filter(sh => inPeriod(sh.date,p)).map(sh => ({...sh, h: handouts.find(h => String(h.id)===String(sh.handoutId))})); let rows = `<tr class="section-row"><td colspan="4"><i class="fas fa-user-clock"></i> الحضور والغياب</td></tr>`; rows += `<tr><td>إجمالي الحصص</td><td>حضور: <b>${present.length}</b></td><td>غياب: <b>${absent.length}</b></td><td>${present.length+absent.length ? (present.length>=absent.length ? '<span class="badge ok">التزام جيد</span>' : '<span class="badge warn">يحتاج متابعة</span>') : '<span class="badge muted">لا توجد بيانات</span>'}</td></tr>`; present.forEach((a,i)=> rows += `<tr><td>حضور ${i+1}</td><td colspan="2">${dateOf(a.date)?.toLocaleDateString('ar-EG') || '---'} ${a._name ? ' - '+esc(a._name):''}</td><td><span class="badge ok">حاضر</span></td></tr>`); absent.forEach((a,i)=> rows += `<tr><td>غياب ${i+1}</td><td colspan="2">${dateOf(a.date)?.toLocaleDateString('ar-EG') || '---'} ${a._name ? ' - '+esc(a._name):''}</td><td><span class="badge bad">غائب</span></td></tr>`); rows += `<tr class="section-row"><td colspan="4"><i class="fas fa-file-invoice"></i> الامتحانات ودرجات الاختبارات</td></tr>`; if (!periodExams.length) rows += '<tr><td colspan="4">لا توجد امتحانات مسجلة لهذا الشهر</td></tr>'; periodExams.forEach(ex => { const sc = scores.find(x => String(x.examId)===String(ex.id) && String(x.studentId)===String(s.id)); rows += `<tr><td>${esc(ex.title || 'امتحان')}</td><td>${esc(dateOf(ex.date || Number(ex.id))?.toLocaleDateString('ar-EG') || '---')}</td><td>${scoreBadge(sc?.mark, ex.maxMarks)}</td><td>${esc(sc?.notes || ex.notes || '---')}</td></tr>`; }); rows += `<tr class="section-row"><td colspan="4"><i class="fas fa-wallet"></i> الاشتراك والدفعات</td></tr><tr><td>حالة الاشتراك</td><td>${moneyBadge(sub)}</td><td>تاريخ الدفع: ${esc(sub ? dateOf(sub.date)?.toLocaleDateString('ar-EG') : '---')}</td><td>${esc(sub?.notes || '---')}</td></tr>`; rows += `<tr class="section-row"><td colspan="4"><i class="fas fa-book"></i> الواجبات والمذكرات</td></tr>`; if (!handoutRows.length) rows += '<tr><td colspan="4">لا توجد واجبات أو مذكرات مسجلة لهذا الشهر</td></tr>'; handoutRows.forEach(x => rows += `<tr><td>${esc(x.h?.title || 'مذكرة/واجب')}</td><td>${esc(dateOf(x.date)?.toLocaleDateString('ar-EG') || '---')}</td><td>${x.paid ? '<span class="badge ok">تم الاستلام/السداد</span>' : '<span class="badge warn">مسجل</span>'}</td><td>${esc(x.notes || '---')}</td></tr>`); return { html:rows, present:present.length, absent:absent.length, exams:periodExams.length, sub }; }
function render(d){ pageData=d; if (!d) return rootState('fa-user-slash','خطأ في تحميل البيانات','تأكد من صحة الرابط أو صلاحيات Firebase.'); const periods=buildPeriods(d); if (!currentPeriodKey || !periods.some(p=>p.key===currentPeriodKey)) currentPeriodKey=periods[0]?.key || ''; const p=periods.find(x=>x.key===currentPeriodKey) || periods[0]; const report = p ? renderReport(d,p) : {html:'',present:0,absent:0,exams:0,sub:null}; const img = d.s.photo || d.s.image || d.s.imageUrl || d.s.studentImage || ''; document.getElementById('app-root').innerHTML = `<div class="hero"><div class="avatar">${img ? `<img src="${esc(img)}" alt="صورة الطالب">` : '<i class="fas fa-user-graduate"></i>'}</div><div><div style="opacity:.85;font-size:.85rem"><i class="fas fa-graduation-cap"></i> صفحة متابعة الطالب</div><h1>${esc(d.s.name || 'طالب')}</h1><div class="sub">${esc(GRADE_LABELS[d.s.grade] || d.s.grade || '---')} - ${esc(d.group?.name || 'بدون مجموعة')}</div></div></div><div class="card"><h2><i class="fas fa-id-card"></i> بيانات الطالب الأساسية</h2><div class="rows"><div class="row"><span class="k">كود الطالب</span><span class="v">${esc(d.s.qrCode)}</span></div><div class="row"><span class="k">حالة الاشتراك</span><span class="v">${moneyBadge(report.sub)}</span></div><div class="row"><span class="k">الهاتف</span><span class="v">${esc(d.s.phone || '---')}</span></div><div class="row"><span class="k">تاريخ الانضمام</span><span class="v">${esc(d.s.joinDate ? dateOf(d.s.joinDate)?.toLocaleDateString('ar-EG') : '---')}</span></div></div></div><div class="card"><h2><i class="fas fa-chart-bar"></i> تقرير الأداء الشهري</h2><div class="period-bar"><button onclick="movePeriod(-1)" title="الشهر السابق"><i class="fas fa-chevron-right"></i></button><select onchange="switchPeriod(this.value)">${periods.map(x=>`<option value="${esc(x.key)}" ${x.key===currentPeriodKey?'selected':''}>${esc(x.label)}</option>`).join('')}</select><button onclick="movePeriod(1)" title="الشهر التالي"><i class="fas fa-chevron-left"></i></button></div><div class="grid"><div class="stat"><div class="num">${report.present}</div><div class="lbl">حضور</div></div><div class="stat"><div class="num">${report.absent}</div><div class="lbl">غياب</div></div><div class="stat"><div class="num">${report.exams}</div><div class="lbl">امتحانات</div></div><div class="stat"><div class="num">${esc(d.s.points || 0)}</div><div class="lbl">نقاط/تقييم</div></div></div><div style="height:.8rem"></div><div class="table-wrap"><table><thead><tr><th>البند</th><th>التفاصيل</th><th>الحالة/الدرجة</th><th>ملاحظات</th></tr></thead><tbody>${report.html}</tbody></table></div></div><div class="card"><h2><i class="fas fa-comment-dots"></i> تقييم وملاحظات المدرس</h2><div class="note">${esc(d.s.teacherNotes || d.s.notes || 'لا توجد ملاحظات حالياً.')}</div></div><div class="footer">هذا الرابط خاص بالطالب: ${esc(d.s.qrCode)}</div>`; }
function movePeriod(dir){ const ps=buildPeriods(pageData || {}); const i=ps.findIndex(p=>p.key===currentPeriodKey); const ni=i+dir; if (ni>=0 && ni<ps.length) switchPeriod(ps[ni].key); }
window.movePeriod=movePeriod;
(async()=>{ if(!(await initFB())) return rootState('fa-wifi','تعذر الاتصال بقاعدة البيانات','تأكد من اتصالك بالإنترنت، أو أن ملفات Firebase مرفوعة مع الموقع.'); const code = new URLSearchParams(location.search).get('id') || new URLSearchParams(location.search).get('code'); if(!code) return rootState('fa-link','رابط الطالب غير صحيح','لا يوجد كود طالب في الرابط.'); try { const data = await loadData(code); render(data); if (data?.s?.qrCode) { unsubscribeStudent?.(); unsubscribeStudent = DB.collection('students').where('qrCode','==',String(data.s.qrCode)).onSnapshot(async()=>{ try { render(await loadData(code)); } catch(e){ console.error(e); } }); } } catch(e){ console.error('student page load failed', e); rootState('fa-triangle-exclamation','خطأ في تحميل البيانات', e.message || 'راجع صلاحيات Firebase والاتصال.'); } })();
</script>
